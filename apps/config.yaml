server:
  gateway_port: 8080
  logic_port: 8001

mysql:
  dsn: 'root:lph126598$@tcp(127.0.0.1:3306)/IMSystem?charset=utf8mb4&parseTime=True&loc=Local'
  max_idle_conns: 10
  max_open_conns: 100

redis:
  addr: '127.0.0.1:6379'
  password: '123456789'
  db: 1

agent:
  # 默认使用的Agent（切换只需要改这个值：deepseek / openai / qwen）
  default: deepseek
  # 所有Agent提供商配置（二级层级，支持多个）
  providers:
    deepseek:
      api_key: ''
      base_url: 'https://api.deepseek.com'
      model_name: 'deepseek-chat'
    openai:
      api_key: ''
      base_url: 'https://api.openai.com/v1'
      model_name: 'gpt-3.5-turbo'
    qwen:
      api_key: ''
      base_url: 'https://dashscope.aliyuncs.com/api'
      model_name: 'qwen-turbo'

log:
  level: "info"                # 日志级别: debug, info, warn, error
  filename: "logs/system.log"  # 日志输出路径
  max_size: 100                # 每个日志文件最大尺寸 (MB)
  max_backups: 5               # 最多保留几个旧文件
  max_age: 30                  # 旧文件最多保留几天
  compress: true               # 是否压缩旧日志 (gzip)