syntax = "proto3";

package pb_msg;

//    protoc --go_out=. --go_opt=module=go-im-system apps/pkg/proto/pb_user/user.proto
option go_package = "go-im-system/apps/pkg/proto/pb_msg";

// 发送消息请求
message SendMessageArgs {
  int64 sender_id = 1; // 发送者id
  int64 receiver_id = 2; // 接收者id
  string body = 3; // 消息体
}

// 发送消息响应
message SendMessageReply {
  int64 msg_id = 1;
}

// 同步消息请求
message SyncUnreadArgs {
  int64 receiver_id = 1;
}

// 同步消息响应
message SyncUnreadReply {
  // 定义一个消息体列表
  repeated MessageItem messages = 1;
}

// 消息体
message MessageItem {
  int64 msg_id = 1;
  int64 sender_id = 2;
  string content = 3;
  string create_time = 4;
}

// 读消息列表请求
message ReadMessagesArgs {
  int64 receiver_id = 1;      // 谁读了消息
  // 后续可以扩展：repeated int64 msg_ids = 2; // 具体读了哪几条
}

// 读消息列表响应
message ReadMessagesReply {
  bool success = 1;        // 返回个 true 就行
}