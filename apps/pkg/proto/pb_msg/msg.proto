syntax = "proto3";

package pb_msg;

// protoc --go_out=. --go_opt=module=go-im-system apps/pkg/proto/pb_msg/msg.proto
option go_package = "go-im-system/apps/pkg/proto/pb_msg";

// 发送消息请求
message SendMessageArgs {
  int64 sender_id = 1; // 发送者id
  int64 receiver_id = 2; // 接收者id
  string body = 3; // 消息体
  // 网关生成的全局消息 ID（雪花），与 messages.msg_id 一致；为 0 时由 Logic 自行生成（兼容旧客户端）
  int64 msg_id = 4;
  // 会话内序号，仅用于同一会话内排序；为 0 表示未使用会话序号
  int64 seq_id = 5;
}

// 发送消息响应
message SendMessageReply {
  int64 msg_id = 1;
}

// 同步消息请求
message SyncUnreadArgs {
  int64 receiver_id = 1;
}

// 同步消息响应
message SyncUnreadReply {
  // 定义一个消息体列表
  repeated MessageItem messages = 1;
}

// 消息体
message MessageItem {
  int64 msg_id = 1;
  int64 sender_id = 2;
  string content = 3;
  string create_time = 4;
  int64 seq_id = 5;
  // 发送状态：0 未发送 1 发送未确认 2 发送已确认（与 models 常量一致）
  int32 send_status = 6;
}

// 网关：对端 WS 已成功写入后上报，将 send_status 0 -> 1
message NotifyDeliveredArgs {
  int64 msg_id = 1;
}

message NotifyDeliveredReply {
  bool success = 1;
}

// 读消息列表请求
message ReadMessagesArgs {
  int64 receiver_id = 1;      // 谁读了消息
  // 后续可以扩展：repeated int64 msg_ids = 2; // 具体读了哪几条
}

// 读消息列表响应
message ReadMessagesReply {
  bool success = 1;        // 返回个 true 就行
}

// 读消息ACK
message ackMessageArgs {
  int64 msg_id = 1;
}

message ackMessageReply {
  bool success = 1;
}