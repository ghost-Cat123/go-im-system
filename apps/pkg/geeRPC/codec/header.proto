syntax = "proto3";

// 所在的包名
package codec;

// 生成的 go 代码所在的目录和包名
option go_package = "./pb";

// 这只是为了网络传输定义的结构，不妨碍你原来的 codec.Header
// RequestHeader与Header一一对应 只需要将传过来的RequestHeader转成header即可解析
message RequestHeader {
  string service_method = 1;
  uint64 seq = 2;
  string error = 3;
}

// 2. 我们的测试业务：打招呼的请求参数
message HelloArgs {
  string name = 1;
  int32 age = 2;
}

// 3. 我们的测试业务：打招呼的返回值
message HelloReply {
  string message = 1;
}